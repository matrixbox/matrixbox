<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aquarium</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1628;color:#c0d8f0;font-family:sans-serif;padding:12px;max-width:420px;margin:auto}
h2{text-align:center;color:#40a0e0;margin-bottom:14px}
.card{background:#0f1f38;border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid #1a3050}
label{display:block;font-size:13px;color:#7ab;margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input[type=range]{width:100%;accent-color:#40a0e0}
.val{float:right;color:#40a0e0;font-weight:bold}
.checks{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.checks label{display:flex;align-items:center;gap:5px;margin:0;cursor:pointer;background:#162840;padding:6px 10px;border-radius:6px;font-size:13px}
.checks input{accent-color:#40a0e0}
.toggle{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.toggle span{font-size:13px;color:#7ab}
.sw{position:relative;width:44px;height:24px}
.sw input{opacity:0;width:0;height:0}
.sw .sl{position:absolute;inset:0;background:#1a3050;border-radius:12px;cursor:pointer;transition:.2s}
.sw .sl:before{content:"";position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#556;border-radius:50%;transition:.2s}
.sw input:checked+.sl{background:#40a0e0}
.sw input:checked+.sl:before{transform:translateX(20px);background:#fff}
.rate{display:flex;gap:6px;margin-top:6px}
.rate button{flex:1;padding:8px;border:none;border-radius:6px;background:#1a3050;color:#7ab;font-size:13px;cursor:pointer}
.rate button.on{background:#40a0e0;color:#fff}
.btns{display:flex;gap:8px;margin-top:14px}
.btns button{flex:1;padding:10px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:bold}
#saveBtn{background:#40a0e0;color:#fff}
#exitBtn{background:#2a1520;color:#e06060}
</style>
</head>
<body>
<h2>&#x1F420; Aquarium</h2>

<div class="card">
<label>Fish Count <span class="val" id="fishVal">5</span></label>
<input type="range" id="maxFish" min="0" max="10" value="5">

<label>Fish Types</label>
<div class="checks">
<label><input type="checkbox" value="clown" checked> Clownfish</label>
<label><input type="checkbox" value="tang" checked> Yellow Tang</label>
<label><input type="checkbox" value="blue" checked> Blue Fish</label>
<label><input type="checkbox" value="pink" checked> Pink Fish</label>
</div>

<label>Fish Spawn Rate</label>
<div class="rate" id="fishRate">
<button data-v="1">Slow</button>
<button data-v="2" class="on">Medium</button>
<button data-v="3">Fast</button>
</div>
</div>

<div class="card">
<div class="toggle">
<span>Bubbles</span>
<label class="sw"><input type="checkbox" id="bubbles" checked><span class="sl"></span></label>
</div>

<label>Max Bubbles <span class="val" id="bubVal">6</span></label>
<input type="range" id="maxBub" min="0" max="12" value="6">

<label>Bubble Rate</label>
<div class="rate" id="bubRate">
<button data-v="1">Slow</button>
<button data-v="2" class="on">Medium</button>
<button data-v="3">Fast</button>
</div>
</div>

<div class="card">
<div class="toggle">
<span>Caustic Light</span>
<label class="sw"><input type="checkbox" id="caustics" checked><span class="sl"></span></label>
</div>
</div>

<div class="btns">
<button id="saveBtn">Save</button>
<button id="exitBtn" onclick="location.href='/exit'">Exit</button>
</div>

<script>
var S={};
function load(){
 fetch("/settings").then(r=>r.json()).then(d=>{
  S=d;
  g("maxFish").value=d.max_fish||5;
  g("fishVal").textContent=d.max_fish||5;
  g("maxBub").value=d.max_bubbles||6;
  g("bubVal").textContent=d.max_bubbles||6;
  g("bubbles").checked=d.bubbles!==false;
  g("caustics").checked=d.caustics!==false;
  var ft=(d.fish_types||"clown,tang,blue,pink").split(",");
  document.querySelectorAll(".checks input").forEach(function(cb){
   cb.checked=ft.indexOf(cb.value)>=0;
  });
  setRate("fishRate",d.fish_rate||2);
  setRate("bubRate",d.bubble_rate||2);
 });
}
function g(id){return document.getElementById(id)}
function setRate(id,v){
 document.querySelectorAll("#"+id+" button").forEach(function(b){
  b.classList.toggle("on",parseInt(b.dataset.v)==v);
 });
}
function send(p){
 fetch("/?"+p,{method:"POST"}).then(r=>r.json()).then(d=>{S=d});
}
g("maxFish").oninput=function(){
 g("fishVal").textContent=this.value;
 send("max_fish="+this.value);
};
g("maxBub").oninput=function(){
 g("bubVal").textContent=this.value;
 send("max_bubbles="+this.value);
};
g("bubbles").onchange=function(){send("bubbles="+this.checked)};
g("caustics").onchange=function(){send("caustics="+this.checked)};
document.querySelectorAll(".checks input").forEach(function(cb){
 cb.onchange=function(){
  var t=[];
  document.querySelectorAll(".checks input:checked").forEach(function(c){t.push(c.value)});
  if(t.length==0){this.checked=true;return}
  send("fish_types="+t.join(","));
 };
});
document.querySelectorAll("#fishRate button").forEach(function(b){
 b.onclick=function(){setRate("fishRate",b.dataset.v);send("fish_rate="+b.dataset.v)};
});
document.querySelectorAll("#bubRate button").forEach(function(b){
 b.onclick=function(){setRate("bubRate",b.dataset.v);send("bubble_rate="+b.dataset.v)};
});
g("saveBtn").onclick=function(){send("save=1");this.textContent="Saved!";setTimeout(function(){g("saveBtn").textContent="Save"},1500)};
load();
</script>
</body>
</html>
