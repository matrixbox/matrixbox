<style>
.clock-preview{height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;letter-spacing:3px;border:1px solid var(--border);background:var(--bg);transition:background .2s,color .2s;margin-top:4px}
</style>

<div class="card">
<div class="section-title">Preview</div>
<div class="clock-preview" id="pv">12:34</div>
</div>

<div class="card">
<div class="section-title">Colors</div>
<label>Text</label>
<div class="swatch-row">
<input type="color" id="fp" value="#ffffff" oninput="sc('f',this.value)">
<div class="color-swatch" style="background:#fff" onclick="sc('f','#ffffff')"></div>
<div class="color-swatch" style="background:#ff4444" onclick="sc('f','#ff4444')"></div>
<div class="color-swatch" style="background:#4488ff" onclick="sc('f','#4488ff')"></div>
<div class="color-swatch" style="background:#44ff44" onclick="sc('f','#44ff44')"></div>
<div class="color-swatch" style="background:#ffff44" onclick="sc('f','#ffff44')"></div>
<div class="color-swatch" style="background:#ff8800" onclick="sc('f','#ff8800')"></div>
<div class="color-swatch" style="background:#ff44ff" onclick="sc('f','#ff44ff')"></div>
<div class="color-swatch" style="background:#44ffff" onclick="sc('f','#44ffff')"></div>
</div>
<label>Background</label>
<div class="swatch-row">
<input type="color" id="bp" value="#000000" oninput="sc('b',this.value)">
<div class="color-swatch" style="background:#000;border-color:rgba(255,255,255,.2)" onclick="sc('b','#000000')"></div>
<div class="color-swatch" style="background:#0a0a1e" onclick="sc('b','#0a0a1e')"></div>
<div class="color-swatch" style="background:#000033" onclick="sc('b','#000033')"></div>
<div class="color-swatch" style="background:#330000" onclick="sc('b','#330000')"></div>
<div class="color-swatch" style="background:#003300" onclick="sc('b','#003300')"></div>
<div class="color-swatch" style="background:#1a1a2e" onclick="sc('b','#1a1a2e')"></div>
</div>
</div>

<div class="card">
<div class="section-title">Display</div>
<div class="toggle-item"><span>Show Day</span><label class="sw"><input type="checkbox" id="show_day" onchange="p('show_day='+(this.checked?1:0))"><span class="sl"></span></label></div>
<div class="toggle-item"><span>Show Date</span><label class="sw"><input type="checkbox" id="show_date" onchange="p('show_date='+(this.checked?1:0))"><span class="sl"></span></label></div>
<div class="toggle-item"><span>Show Seconds</span><label class="sw"><input type="checkbox" id="show_seconds" onchange="p('show_seconds='+(this.checked?1:0))"><span class="sl"></span></label></div>
<div class="toggle-item"><span>Show Temperature</span><label class="sw"><input type="checkbox" id="show_temp" onchange="p('show_temp='+(this.checked?1:0))"><span class="sl"></span></label></div>
</div>

<div class="card">
<div class="section-title">Weather City</div>
<div style="display:flex;gap:8px">
<input type="text" id="city" placeholder="e.g. Stockholm">
<button class="btn btn-sm" onclick="p('city='+encodeURIComponent(document.getElementById('city').value))">Set</button>
</div>
</div>

<div class="card">
<div class="section-title">Font Size</div>
<div class="seg" id="font-seg">
<button id="fb_mini" onclick="sf('mini')">Mini</button>
<button id="fb_small" onclick="sf('small')">Small</button>
<button id="fb_large" onclick="sf('large')">Large</button>
</div>
</div>

<div class="card">
<div class="section-title">Scale</div>
<div class="seg">
<button id="sc_1" onclick="ss(1)">1×</button>
<button id="sc_2" onclick="ss(2)">2×</button>
<button id="sc_3" onclick="ss(3)">3×</button>
<button id="sc_4" onclick="ss(4)">4×</button>
</div>
</div>

<button class="btn btn-full" onclick="p('save=true')">&#128190; Save Settings</button>

<script>
var dt;
function p(q){fetch("/?"+q,{method:"POST"})}
function sc(t,h){
if(t==='f')document.getElementById('fp').value=h;
else document.getElementById('bp').value=h;
upv();clearTimeout(dt);
dt=setTimeout(function(){p((t==='f'?'f_hex':'b_hex')+'='+h.slice(1))},200);
}
function sf(s){p('size='+s);document.querySelectorAll('#font-seg button').forEach(function(b){b.classList.remove('on')});document.getElementById('fb_'+s).classList.add('on')}
function ss(n){p('scale='+n);document.querySelectorAll('#font-seg ~ .seg button').forEach(function(b){b.classList.remove('on')});document.getElementById('sc_'+n).classList.add('on')}
function upv(){var v=document.getElementById('pv');v.style.backgroundColor=document.getElementById('bp').value;v.style.color=document.getElementById('fp').value}
fetch("/settings").then(function(r){return r.json()}).then(function(s){
document.getElementById("show_day").checked=s.show_day==1;
document.getElementById("show_date").checked=s.show_date==1;
document.getElementById("show_seconds").checked=s.show_seconds==1;
document.getElementById("show_temp").checked=s.show_temp==1;
if(s.city)document.getElementById("city").value=s.city;
if(s.f_hex)document.getElementById("fp").value=s.f_hex;
if(s.b_hex)document.getElementById("bp").value=s.b_hex;
if(s.font){var fb=document.getElementById('fb_'+s.font);if(fb){document.querySelectorAll('#font-seg button').forEach(function(b){b.classList.remove('on')});fb.classList.add('on')}}
var sc=s.scale||1;var sb=document.getElementById('sc_'+sc);
document.querySelectorAll('#font-seg ~ .seg button').forEach(function(b){b.classList.remove('on')});
if(sb)sb.classList.add('on');
upv();
});
</script>
