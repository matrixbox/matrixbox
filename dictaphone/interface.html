<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dictaphone</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#1a1a2e;color:#f0f0f0;padding:16px;max-width:420px;margin:0 auto}
a.x{color:#ff4444;text-decoration:none;font-size:20px}
.card{background:#252542;border:1px solid #3a3a5c;border-radius:10px;padding:14px;margin-bottom:12px}
h2{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:8px}
.log{background:#1e1e35;border:1px solid #3a3a5c;border-radius:8px;padding:10px;min-height:100px;max-height:200px;overflow-y:auto;font-size:14px;line-height:1.6;margin-bottom:10px;word-break:break-word}
.mic{width:100%;padding:16px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s}
.mic.off{background:#2563eb;color:#fff}
.mic.on{background:#ef4444;color:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}
.clr{width:100%;padding:10px;background:#303050;color:#f0f0f0;border:1px solid #4a4a6a;border-radius:8px;font-size:14px;cursor:pointer;margin-top:8px}
.clr:hover{background:#404068}
.s{font-size:12px;color:#666;margin-top:6px;text-align:center}
#status{font-size:13px;color:#888;margin-bottom:8px}
.interim{color:#666;font-style:italic}
</style>
</head>
<body>
<a href="/exit" class="x">&#x274C;</a>
<div class="card">
<h2>Dictaphone</h2>
<div id="status">Tap the button to start listening</div>
<div class="log" id="log"></div>
<button class="mic off" id="mic" onclick="toggleMic()">&#127908; Start Listening</button>
<button class="clr" onclick="clearAll()">Clear Display</button>
</div>
<div class="card">
<h2>Manual Input</h2>
<form onsubmit="sendManual(event)">
<input type="text" id="manual" placeholder="Type text here..." style="width:100%;padding:10px;background:#1e1e35;color:#f0f0f0;border:1px solid #4a4a6a;border-radius:8px;font-size:14px;margin-bottom:8px">
<button type="submit" class="clr" style="background:#2563eb;border-color:#2563eb">Send</button>
</form>
</div>
<p class="s">Speech recognition runs in your browser.<br>Text is sent to the display in real-time.</p>
<script>
var listening=false,recognition=null;
var btn=document.getElementById("mic");
var log=document.getElementById("log");
var status=document.getElementById("status");

function send(t){
 var x=new XMLHttpRequest();
 x.open("GET","/text?t="+encodeURIComponent(t),true);
 x.send();
}

function addLog(t,cls){
 var d=document.createElement("div");
 d.textContent=t;
 if(cls)d.className=cls;
 log.appendChild(d);
 log.scrollTop=log.scrollHeight;
}

function clearAll(){
 log.innerHTML="";
 var x=new XMLHttpRequest();
 x.open("GET","/clear",true);
 x.send();
}

function sendManual(e){
 e.preventDefault();
 var inp=document.getElementById("manual");
 var t=inp.value.trim();
 if(t){send(t);addLog(t);inp.value="";}
}

function toggleMic(){
 if(listening){stopMic();return;}
 if(!("webkitSpeechRecognition" in window)&&!("SpeechRecognition" in window)){
  status.textContent="Speech recognition not supported in this browser.";
  return;
 }
 var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 recognition=new SR();
 recognition.continuous=false;
 recognition.interimResults=true;
 recognition.lang=navigator.language||"en-US";

 var interimDiv=null;
 var pendingText="";

 recognition.onstart=function(){
  listening=true;
  pendingText="";
  btn.className="mic on";
  btn.innerHTML="&#128308; Listening...";
  status.textContent="Listening ("+recognition.lang+")";
 };

 recognition.onresult=function(e){
  var full="";
  for(var i=0;i<e.results.length;i++){
   full+=e.results[i][0].transcript;
  }
  pendingText=full;
  if(!interimDiv){interimDiv=document.createElement("div");interimDiv.className="interim";log.appendChild(interimDiv);}
  interimDiv.textContent=full;
  log.scrollTop=log.scrollHeight;
 };

 recognition.onerror=function(e){
  status.textContent="Error: "+e.error;
  if(e.error!="no-speech"&&e.error!="aborted"){stopMic();}
 };

 recognition.onend=function(){
  if(pendingText){
   send(pendingText);
   addLog(pendingText);
   pendingText="";
  }
  if(interimDiv){interimDiv.remove();interimDiv=null;}
  if(listening){recognition.start();}
 };

 recognition.start();
}

function stopMic(){
 listening=false;
 if(recognition){recognition.stop();recognition=null;}
 btn.className="mic off";
 btn.innerHTML="&#127908; Start Listening";
 status.textContent="Stopped";
}
</script>
</body>
</html>
