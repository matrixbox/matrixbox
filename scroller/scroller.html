<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scroller Control</title>

<style>
    body {
        background: #0d0d0d;
        color: #e6e6e6;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        margin-bottom: 10px;
        font-weight: 300;
        letter-spacing: 1px;
    }

    .container {
        width: 90%;
        max-width: 500px;
        background: #1a1a1a;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    label {
        display: block;
        margin-top: 15px;
        margin-bottom: 5px;
        font-size: 14px;
        color: #bfbfbf;
    }

    input[type="text"] {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: none;
        background: #333;
        color: #fff;
        font-size: 14px;
        margin-bottom: 10px;
    }

    button {
        background: #333;
        color: #fff;
        border: none;
        padding: 10px 14px;
        margin: 5px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 14px;
    }

    button:hover {
        background: #555;
    }

    .color-btn {
        width: 28px;
        height: 28px;
        border-radius: 4px;
        border: 2px solid #444;
        padding: 0;
    }

    .top-right {
        position: absolute;
        top: 10px;
        right: 10px;
        color: #888;
        text-decoration: none;
        font-size: 20px;
    }
</style>
</head>

<body>

<a href="/exit" class="top-right">✖</a>

<h1>Scroller Control</h1>

<div class="container">

    <label>Text</label>
    <input type="text" id="text">

    <label>Offset (0–32)</label>
    <input type="text" id="offset">

    <label>Scale (1–2)</label>
    <input type="text" id="scale">

    <div style="margin-top: 10px;">
        <button id="mini">Mini</button>
        <button id="small">Small</button>
        <button id="large">Large</button>
    </div>

    <div style="margin-top: 10px;">
        <button id="white"  class="color-btn" style="background:white;"></button>
        <button id="blue"   class="color-btn" style="background:blue;"></button>
        <button id="red"    class="color-btn" style="background:red;"></button>
        <button id="yellow" class="color-btn" style="background:yellow;"></button>
        <button id="orange" class="color-btn" style="background:orange;"></button>
        <button id="green"  class="color-btn" style="background:green;"></button>
    </div>


<br>
<label style="margin-top: 20px;">Shadow Color</label>
<div style="margin-top: 10px;">
    <button id="shadow_black"     class="color-btn" style="background:black;"></button>
    <button id="shadow_yellow"    class="color-btn" style="background:yellow;"></button>
    <button id="shadow_brightwhite" class="color-btn" style="background:white;"></button>
    <button id="shadow_blue"      class="color-btn" style="background:blue;"></button>
    <button id="shadow_red"       class="color-btn" style="background:red;"></button>
    <button id="shadow_white"     class="color-btn" style="background:#ddd;"></button>
    <button id="shadow_light_blue" class="color-btn" style="background:lightblue;"></button>
    <button id="shadow_green"     class="color-btn" style="background:green;"></button>
    <button id="shadow_grey"      class="color-btn" style="background:grey;"></button>
    <button id="shadow_black2"    class="color-btn" style="background:#222;"></button>
    <button id="shadow_pink"      class="color-btn" style="background:pink;"></button>
    <button id="shadow_orange"    class="color-btn" style="background:orange;"></button>
</div>


    <label style="margin-top: 20px;">URL</label>
    <input type="text" id="url">

    <div style="margin-top: 20px;">
        <button id="reverse">Reverse Direction</button>
        <button id="scroll">Scroll / Static</button>
    </div>

</div>
<script>
[
    "black","yellow","brightwhite","blue","red","white",
    "light_blue","green","grey","black2","pink","orange"
].forEach(c =>
    document.getElementById("shadow_" + c).addEventListener("click", () =>
        fetch("/?shadow_color=" + c, { method: "POST" })
    )
);
</script>


<script>
function postParam(param, value) {
    fetch(`/?${param}=${value}`, { method: "POST" });
}

document.getElementById("text").addEventListener("change", e =>
    postParam("text", e.target.value.replace(/#/g, "%23"))
);

document.getElementById("offset").addEventListener("change", e =>
    postParam("offset", e.target.value)
);

document.getElementById("scale").addEventListener("change", e =>
    postParam("scale", e.target.value)
);

document.getElementById("url").addEventListener("change", e =>
    fetch("/", { method: "POST", body: `url=${e.target.value}` })
);

["mini","small","large"].forEach(id =>
    document.getElementById(id).addEventListener("click", () =>
        postParam("size", id)
    )
);

["white","blue","red","yellow","orange","green"].forEach(id =>
    document.getElementById(id).addEventListener("click", () =>
        postParam("color", id)
    )
);

document.getElementById("reverse").addEventListener("click", () =>
    postParam("reverse", "true")
);

document.getElementById("scroll").addEventListener("click", () =>
    postParam("scroll", "true")
);
</script>

</body>
</html>
