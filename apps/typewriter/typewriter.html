<style>
.tw-preview{background:#000;border:2px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;position:relative;image-rendering:pixelated}
.tw-preview canvas{width:100%;height:auto;display:block}
.tw-editor{width:100%;min-height:120px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;color:#ccc;font-family:'Cascadia Mono','Fira Code','Consolas',monospace;font-size:.88rem;line-height:1.5;outline:none;white-space:pre-wrap;word-break:break-word;overflow-y:auto}
.tw-editor:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,111,255,.15)}
.tw-editor:empty::before{content:attr(data-ph);color:var(--muted);pointer-events:none}
.tw-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.tw-bar .seg{flex-shrink:0}
.tw-swatch{width:24px;height:24px;border-radius:6px;border:2px solid var(--border);cursor:pointer;transition:transform .1s,border-color .1s;flex-shrink:0}
.tw-swatch:hover,.tw-swatch.on{transform:scale(1.15);border-color:rgba(255,255,255,.6)}
.tw-info{color:var(--muted);font-size:.7rem;margin-top:6px;text-align:right}
</style>

<div class="card">
<div class="section-title">Typewriter</div>
<div class="tw-bar">
<div class="seg" id="fontSeg">
<button onclick="setFont('mini')" class="on">Mini</button>
<button onclick="setFont('small')">Small</button>
<button onclick="setFont('large')">Large</button>
</div>
<div style="display:flex;gap:4px;align-items:center" id="colors"></div>
</div>
<div class="tw-preview"><canvas id="cvs"></canvas></div>
<div class="tw-editor" id="ed" contenteditable="true" spellcheck="false" data-ph="Start typing..."></div>
<div class="tw-info" id="info">Select text + tap a color to colorize</div>
</div>

<script>
var _font="mini",_color="white",_hex="#ccc",_rows=5,_cols=16,_w=64,_h=32,_t=null;
var _colors=[
["yellow","#cc0"],["white","#ccc"],["brightwhite","#fff"],
["blue","#08f"],["red","#f22"],["green","#0d0"],
["orange","#f80"],["pink","#f6a"],["light_blue","#6af"]
];
function initColors(){
var el=document.getElementById("colors");
for(var i=0;i<_colors.length;i++){var c=_colors[i];
var s=document.createElement("div");
s.className="tw-swatch"+(c[0]===_color?" on":"");
s.style.background=c[1];s.dataset.name=c[0];s.dataset.hex=c[1];
s.onclick=function(){setColor(this.dataset.name,this.dataset.hex)};
el.appendChild(s);}
}
function setFont(f){
_font=f;
var btns=document.querySelectorAll("#fontSeg button");
for(var i=0;i<btns.length;i++)btns[i].className=btns[i].textContent.toLowerCase()===f?"on":"";
send();
}
function setColor(c,hex){
var sel=window.getSelection();
var ed=document.getElementById("ed");
if(sel.rangeCount>0&&!sel.isCollapsed&&ed.contains(sel.anchorNode)){
var range=sel.getRangeAt(0);
try{var span=document.createElement("span");
span.dataset.c=c;span.style.color=hex;
range.surroundContents(span);}
catch(e){var frag=range.extractContents();
var span=document.createElement("span");
span.dataset.c=c;span.style.color=hex;
span.appendChild(frag);range.insertNode(span);}
sel.removeAllRanges();
}
_color=c;_hex=hex;ed.style.color=hex;
var sw=document.querySelectorAll(".tw-swatch");
for(var i=0;i<sw.length;i++)sw[i].className="tw-swatch"+(sw[i].dataset.name===c?" on":"");
send();
}
function serialize(){
var ed=document.getElementById("ed");
var lines=[],cur=[];
function push(t,c){if(t)cur.push({t:t,c:c})}
function nl(){lines.push(cur);cur=[];}
function walk(node,c){
if(node.nodeType===3){
var t=node.textContent;var p=t.split("\n");
for(var i=0;i<p.length;i++){if(i>0)nl();push(p[i],c);}
}else if(node.nodeName==="BR"){
var pr=node.parentNode;
if(pr&&pr!==ed&&(pr.nodeName==="DIV"||pr.nodeName==="P")&&!node.previousSibling&&!node.nextSibling){}
else nl();
}else{
var nc=c;
if(node.dataset&&node.dataset.c)nc=node.dataset.c;
var isB=node.nodeName==="DIV"||node.nodeName==="P";
if(isB&&node!==ed&&(cur.length>0||lines.length>0))nl();
for(var ch=node.firstChild;ch;ch=ch.nextSibling)walk(ch,nc);
}
}
walk(ed,_color);
if(cur.length>0)nl();
for(var i=0;i<lines.length;i++){
var m=[];
for(var j=0;j<lines[i].length;j++){
var s=lines[i][j];
if(m.length>0&&m[m.length-1].c===s.c)m[m.length-1].t+=s.t;
else m.push({t:s.t,c:s.c});
}lines[i]=m;
}
return lines;
}
function send(){
clearTimeout(_t);
_t=setTimeout(function(){
var data=serialize();
fetch("/?font="+_font,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
.then(function(r){return r.json()})
.then(function(d){
_w=d.w;_h=d.h;_rows=d.rows;_cols=d.cols;
document.getElementById("info").textContent=_w+"x"+_h+" | ~"+_cols+" cols x "+_rows+" rows | font: "+d.font;
drawPreview();
});
},50);
}
function drawPreview(){
var cvs=document.getElementById("cvs");
cvs.width=_w;cvs.height=_h;
var ctx=cvs.getContext("2d");
ctx.fillStyle="#000";ctx.fillRect(0,0,_w,_h);
ctx.fillStyle="#222";
var fh=_font==="mini"?6:_font==="small"?8:16;
for(var i=1;i<Math.floor(_h/fh);i++)ctx.fillRect(0,i*fh,_w,1);
}
document.getElementById("ed").addEventListener("input",send);
initColors();
fetch("/tw/info").then(function(r){return r.json()}).then(function(d){
_w=d.w;_h=d.h;_rows=d.rows;_cols=d.cols;_font=d.font;
document.getElementById("info").textContent=_w+"x"+_h+" | ~"+_cols+" cols x "+_rows+" rows | font: "+d.font;
drawPreview();
});
document.getElementById("ed").focus();
</script>
