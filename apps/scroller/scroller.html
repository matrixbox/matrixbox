<div class="card">
<div class="section-title">Text</div>
<div style="display:flex;gap:8px">
<input type="text" id="text" placeholder="Enter message…">
<button class="btn btn-sm" onclick="send()">&#9654; Send</button>
</div>
</div>

<div class="card">
<div class="section-title">Text Color</div>
<div class="swatch-row">
<div class="color-swatch" style="background:#fff" onclick="pc('white')"></div>
<div class="color-swatch" style="background:#4488ff" onclick="pc('blue')"></div>
<div class="color-swatch" style="background:#ff4444" onclick="pc('red')"></div>
<div class="color-swatch" style="background:#ffff44" onclick="pc('yellow')"></div>
<div class="color-swatch" style="background:#ff8800" onclick="pc('orange')"></div>
<div class="color-swatch" style="background:#44ff44" onclick="pc('green')"></div>
</div>
</div>

<div class="card">
<div class="section-title">Shadow Color</div>
<div class="swatch-row">
<div class="color-swatch" style="background:#000;border-color:rgba(255,255,255,.2)" onclick="psc('black')"></div>
<div class="color-swatch" style="background:#ffff44" onclick="psc('yellow')"></div>
<div class="color-swatch" style="background:#fff" onclick="psc('brightwhite')"></div>
<div class="color-swatch" style="background:#4488ff" onclick="psc('blue')"></div>
<div class="color-swatch" style="background:#ff4444" onclick="psc('red')"></div>
<div class="color-swatch" style="background:#ddd" onclick="psc('white')"></div>
<div class="color-swatch" style="background:#add8e6" onclick="psc('light_blue')"></div>
<div class="color-swatch" style="background:#44ff44" onclick="psc('green')"></div>
<div class="color-swatch" style="background:#888" onclick="psc('grey')"></div>
<div class="color-swatch" style="background:#222" onclick="psc('black2')"></div>
<div class="color-swatch" style="background:#ffb6c1" onclick="psc('pink')"></div>
<div class="color-swatch" style="background:#ff8800" onclick="psc('orange')"></div>
</div>
</div>

<div class="card">
<div class="section-title">Font Size</div>
<div class="seg" id="font-size-seg">
<button id="sz_mini" onclick="pf('mini')">Mini</button>
<button id="sz_small" onclick="pf('small')">Small</button>
<button id="sz_large" onclick="pf('large')">Large</button>
</div>
</div>

<div class="card">
<div class="section-title">Direction</div>
<div class="seg">
<button id="dir_rtl" class="on" onclick="pr(1)">&#8592; Right to Left</button>
<button id="dir_ltr" onclick="pr(0)">Left to Right &#8594;</button>
</div>
</div>

<div class="card">
<div class="section-title">URL Feed</div>
<div style="display:flex;gap:8px">
<input type="text" id="url" placeholder="http://…">
<button class="btn btn-sm" onclick="pu()">Set</button>
</div>
</div>

<div class="card">
<div class="section-title">Offset &amp; Scale</div>
<label>Vertical Offset</label>
<div class="range-wrap">
<input type="range" id="offset" min="0" max="32" step="1" value="0" oninput="document.getElementById('v_off').textContent=this.value" onchange="p('offset='+this.value)">
<span class="range-val" id="v_off">0</span>
</div>
<label>Scale</label>
<div class="range-wrap">
<input type="range" id="scale" min="1" max="2" step="1" value="1" oninput="document.getElementById('v_sc').textContent=this.value+'×'" onchange="p('scale='+this.value)">
<span class="range-val" id="v_sc">1×</span>
</div>
</div>

<script>
function p(q){fetch("/?"+q,{method:"POST"})}
function send(){var t=document.getElementById("text").value;if(t)p("text="+encodeURIComponent(t))}
function pc(c){p("color="+c)}
function psc(c){p("shadow_color="+c)}
function pf(s){p("size="+s);document.querySelectorAll("#font-size-seg button").forEach(function(b){b.classList.toggle("on",b.id==="sz_"+s)})}
function pr(v){p("reverse="+v);document.getElementById("dir_rtl").classList.toggle("on",v===1);document.getElementById("dir_ltr").classList.toggle("on",v===0)}
function pu(){var v=document.getElementById("url").value;if(v)fetch("/",{method:"POST",body:"url="+v})}
document.getElementById("text").addEventListener("change",function(e){p("text="+encodeURIComponent(e.target.value))});
document.getElementById("sz_large").classList.add("on");
</script>
