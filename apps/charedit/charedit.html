<div class="card">
<div class="section-title">Font</div>
<div class="seg" id="font-seg">
<button id="f_large" class="on" onclick="sf('large')">Large</button>
<button id="f_small" onclick="sf('small')">Small</button>
<button id="f_mini" onclick="sf('mini')">Mini</button>
<button id="f_custom" onclick="sf('custom')">Custom</button>
</div>
</div>

<div class="card">
<div class="section-title">Character</div>
<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
<select id="charsel" onchange="lc(this.value)" style="flex:1;min-width:120px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:6px 8px;font-size:.85rem"></select>
<input type="text" id="newchar" maxlength="4" placeholder="New…" style="width:60px">
<button class="btn btn-sm" onclick="nc()">+ Add</button>
</div>
</div>

<div class="card" id="editor-card">
<div class="section-title">Pixel Editor <span id="charinfo" style="float:right;font-size:.65rem;color:var(--muted)"></span></div>
<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
<label style="font-size:.75rem;color:var(--muted)">Width</label>
<input type="number" id="gw" min="1" max="32" value="8" style="width:52px" onchange="rg()">
<label style="font-size:.75rem;color:var(--muted)">Height</label>
<span id="gh" style="font-size:.85rem"></span>
</div>
<div id="grid" style="display:inline-grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:6px;overflow:hidden;touch-action:none"></div>
<div style="margin-top:10px">
<div class="section-title" style="margin-bottom:6px">Paint Color</div>
<div class="swatch-row" id="pal-row"></div>
</div>
</div>

<div class="card">
<div style="display:flex;gap:8px;flex-wrap:wrap">
<button class="btn" onclick="sv()">&#128190; Save Character</button>
<button class="btn" style="background:var(--surface3)" onclick="dl()">&#10060; Delete</button>
<button class="btn" style="background:var(--surface3)" onclick="clr()">Clear Grid</button>
</div>
</div>

<div class="card" id="preview-card">
<div class="section-title">Preview</div>
<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
<input type="text" id="prevtxt" value="Hello" placeholder="Preview text…" style="flex:1">
<button class="btn btn-sm" onclick="pv()">Show</button>
</div>
<canvas id="prevcan" height="40" style="width:100%;background:#000;border-radius:6px;image-rendering:pixelated"></canvas>
</div>

<script>
var F='large',chars={},grid=[],GW=8,GH=14,paintC=5,dragging=false,dragVal=-1;
var PAL=[[0,0,0],[50,50,0],[50,50,50],[0,59,122],[100,0,0],[20,20,20],[20,20,40],[0,100,10],[0,0,100],[0,30,3],[0,0,0],[50,30,0],[0,0,100]];
var PNAMES=["black","yellow","brightwhite","blue","red","white","light_blue","green","blue2","dark_green","(10)","orange"];

function p(q){return fetch("/?"+q,{method:"POST"}).then(r=>r.text())}
function gj(q){return fetch("/?"+q).then(r=>r.json())}

function sf(f){
 F=f;
 document.querySelectorAll("#font-seg button").forEach(b=>b.classList.toggle("on",b.id==="f_"+f));
 gj("action=list&font="+f).then(d=>{
  chars=d.chars||{};GH=d.height||14;
  document.getElementById("gh").textContent=GH;
  populateSel();
  var ks=Object.keys(chars);if(ks.length)lc(ks[0]);else newGrid();
 });
}

function populateSel(){
 var s=document.getElementById("charsel");s.innerHTML="";
 Object.keys(chars).sort().forEach(k=>{
  var o=document.createElement("option");o.value=k;o.textContent=k+" (w"+chars[k]+")";s.appendChild(o);
 });
}

function lc(ch){
 document.getElementById("charsel").value=ch;
 gj("action=get&font="+F+"&char="+encodeURIComponent(ch)).then(d=>{
  GW=d.width;GH=d.height;grid=d.grid;
  document.getElementById("gw").value=GW;
  document.getElementById("gh").textContent=GH;
  document.getElementById("charinfo").textContent=ch+" — "+GW+"×"+GH;
  drawGrid();
 });
}

function newGrid(){
 GW=parseInt(document.getElementById("gw").value)||6;
 grid=[];for(var y=0;y<GH;y++){var r=[];for(var x=0;x<GW;x++)r.push(0);grid.push(r);}
 drawGrid();
}
function rg(){newGrid();}

function drawGrid(){
 var g=document.getElementById("grid");
 var sz=Math.min(28,Math.floor(300/Math.max(GW,GH)));
 g.style.gridTemplateColumns="repeat("+GW+","+sz+"px)";
 g.innerHTML="";
 for(var y=0;y<GH;y++)for(var x=0;x<GW;x++){
  var c=document.createElement("div");
  var v=(grid[y]&&grid[y][x])||0;
  c.style.cssText="width:"+sz+"px;height:"+sz+"px;background:rgb("+PAL[v].join(",")+");cursor:crosshair;transition:background .05s";
  c.dataset.x=x;c.dataset.y=y;
  c.addEventListener("pointerdown",function(e){e.preventDefault();dragging=true;var cx=+this.dataset.x,cy=+this.dataset.y;dragVal=(grid[cy][cx]===paintC)?0:paintC;setpx(cx,cy,dragVal);});
  c.addEventListener("pointerenter",function(e){if(dragging){setpx(+this.dataset.x,+this.dataset.y,dragVal);}});
  g.appendChild(c);
 }
}

function setpx(x,y,v){
 if(!grid[y])return;grid[y][x]=v;
 var g=document.getElementById("grid");
 var i=y*GW+x;if(g.children[i])g.children[i].style.background="rgb("+PAL[v].join(",")+")";
}

document.addEventListener("pointerup",function(){dragging=false;});

function buildPal(){
 var r=document.getElementById("pal-row");r.innerHTML="";
 PAL.forEach(function(c,i){
  if(i>=12)return;
  var d=document.createElement("div");
  d.className="color-swatch"+(i===paintC?" sel":"");
  d.style.background="rgb("+c.join(",")+")";
  if(i===0)d.style.borderColor="rgba(255,255,255,.2)";
  if(i===paintC)d.style.boxShadow="0 0 0 2px var(--accent)";
  d.onclick=function(){paintC=i;buildPal();};
  r.appendChild(d);
 });
}

function sv(){
 var ch=document.getElementById("charsel").value||document.getElementById("newchar").value;
 if(!ch){alert("No character selected");return;}
 var data={action:"save",font:F,char:ch,width:GW,grid:grid};
 fetch("/?action=save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)}).then(r=>r.text()).then(t=>{
  document.getElementById("charinfo").textContent=t;
  sf(F);
 });
}

function dl(){
 var ch=document.getElementById("charsel").value;
 if(!ch||!confirm("Delete "+ch+"?"))return;
 p("action=delete&font="+F+"&char="+encodeURIComponent(ch)).then(()=>sf(F));
}

function clr(){
 for(var y=0;y<GH;y++)for(var x=0;x<GW;x++)grid[y][x]=0;
 drawGrid();
}

function nc(){
 var ch=document.getElementById("newchar").value;
 if(!ch)return;
 document.getElementById("newchar").value="";
 GW=parseInt(document.getElementById("gw").value)||6;
 grid=[];for(var y=0;y<GH;y++){var r=[];for(var x=0;x<GW;x++)r.push(0);grid.push(r);}
 var o=document.createElement("option");o.value=ch;o.textContent=ch+" (new)";
 document.getElementById("charsel").appendChild(o);
 document.getElementById("charsel").value=ch;
 document.getElementById("charinfo").textContent=ch+" — "+GW+"×"+GH+" (new)";
 drawGrid();
}

function pv(){
 var txt=document.getElementById("prevtxt").value;
 p("action=preview&text="+encodeURIComponent(txt)+"&font="+F);
}

buildPal();
sf("large");
</script>
