<style>
.mic-btn{width:100%;padding:16px;border:none;border-radius:var(--r);font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.3px}
.mic-off{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 14px rgba(124,111,255,.35)}
.mic-on{background:linear-gradient(135deg,#e03c3c,#ff6060);color:#fff;animation:pulse-mic 1.5s infinite;box-shadow:0 2px 14px rgba(224,60,60,.4)}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 rgba(224,60,60,.4)}50%{box-shadow:0 0 0 12px rgba(224,60,60,0)}}
.log{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;min-height:80px;max-height:180px;overflow-y:auto;font-size:.88rem;line-height:1.6;word-break:break-word}
.interim{color:var(--muted);font-style:italic}
</style>

<div class="card">
<div class="section-title">Voice Input</div>
<div id="status" style="color:var(--muted);font-size:.82rem;margin-bottom:10px">Tap the button to start listening</div>
<div class="log" id="log"></div>
<button class="mic-btn mic-off" id="mic" onclick="toggleMic()" style="margin-top:10px">&#127908; Start Listening</button>
<button class="btn btn-full btn-ghost" onclick="clearAll()" style="margin-top:8px">&#128465; Clear Display</button>
</div>

<div class="card">
<div class="section-title">Manual Input</div>
<div style="display:flex;gap:8px">
<input type="text" id="manual" placeholder="Type text here&hellip;">
<button class="btn btn-sm" onclick="sendManual()">Send</button>
</div>
</div>

<p style="color:var(--muted);font-size:.78rem;text-align:center;margin-top:12px">Speech recognition runs in your browser &mdash; text is sent live to the display.</p>

<script>
var listening=false,recognition=null;
var btn=document.getElementById("mic");
var log=document.getElementById("log");
var status=document.getElementById("status");

function send(t){fetch("/text?t="+encodeURIComponent(t))}

function addLog(t,cls){var d=document.createElement("div");d.textContent=t;if(cls)d.className=cls;log.appendChild(d);log.scrollTop=log.scrollHeight}

function clearAll(){log.innerHTML="";fetch("/clear")}

function sendManual(){var inp=document.getElementById("manual");var t=inp.value.trim();if(t){send(t);addLog(t);inp.value=""}}

document.getElementById("manual").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();sendManual()}});

function toggleMic(){if(listening){stopMic();return;}
  if(!("webkitSpeechRecognition" in window)&&!("SpeechRecognition" in window)){status.textContent="Speech recognition not supported in this browser.";return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.continuous=false;recognition.interimResults=true;recognition.lang=navigator.language||"en-US";
  var interimDiv=null,pendingText="";
  recognition.onstart=function(){listening=true;pendingText="";btn.className="mic-btn mic-on";btn.innerHTML="&#128308; Listening\u2026";status.textContent="Listening ("+recognition.lang+")"};
  recognition.onresult=function(e){var full="";for(var i=0;i<e.results.length;i++)full+=e.results[i][0].transcript;pendingText=full;if(!interimDiv){interimDiv=document.createElement("div");interimDiv.className="interim";log.appendChild(interimDiv);}interimDiv.textContent=full;log.scrollTop=log.scrollHeight};
  recognition.onerror=function(e){status.textContent="Error: "+e.error;if(e.error!="no-speech"&&e.error!="aborted")stopMic()};
  recognition.onend=function(){if(pendingText){send(pendingText);addLog(pendingText);pendingText="";}if(interimDiv){interimDiv.remove();interimDiv=null;}if(listening)recognition.start()};
  recognition.start();
}
function stopMic(){listening=false;if(recognition){recognition.stop();recognition=null;}btn.className="mic-btn mic-off";btn.innerHTML="&#127908; Start Listening";status.textContent="Stopped"}
</script>
