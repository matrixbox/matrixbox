<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clock</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#1a1a2e;color:#f0f0f0;padding:16px;max-width:420px;margin:0 auto}
a.x{color:#ff4444;text-decoration:none;font-size:20px}
.card{background:#252542;border:1px solid #3a3a5c;border-radius:10px;padding:14px;margin-bottom:12px}
h2{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:8px;font-weight:600}
.r{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #333}
.r:last-child{border-bottom:none}
.r label{font-size:14px}
.s{position:relative;width:44px;height:24px;flex-shrink:0}
.s input{opacity:0;width:0;height:0}
.sl{position:absolute;cursor:pointer;inset:0;background:#444;border-radius:24px;transition:.2s}
.sl:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#888;border-radius:50%;transition:.2s}
.s input:checked+.sl{background:#2563eb}
.s input:checked+.sl:before{transform:translateX(20px);background:#fff}
.cr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cr label{font-size:14px;width:80px}
.cr input[type=color]{width:44px;height:30px;border:1px solid #4a4a6a;border-radius:6px;background:#1e1e35;cursor:pointer;padding:2px}
.sw{display:flex;gap:5px;flex-wrap:wrap}
.sw button{width:26px;height:26px;border:2px solid #4a4a6a;border-radius:5px;cursor:pointer;transition:.15s}
.sw button:hover{border-color:#aaa;transform:scale(1.1)}
.f{display:flex;gap:6px}
.f button{padding:7px 14px;background:#303050;color:#f0f0f0;border:1px solid #4a4a6a;border-radius:6px;cursor:pointer;font-size:13px;transition:.15s}
.f button:hover{background:#404068}
.f button.a{background:#2563eb;border-color:#2563eb}
.ci{display:flex;gap:8px}
.ci input{flex:1;padding:8px;background:#1e1e35;color:#f0f0f0;border:1px solid #4a4a6a;border-radius:6px;font-size:14px}
.ci button{padding:8px 14px;background:#303050;color:#f0f0f0;border:1px solid #4a4a6a;border-radius:6px;cursor:pointer}
.b{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin-top:4px}
.b:hover{background:#1d4ed8}
.pv{height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;letter-spacing:2px;border:1px solid #4a4a6a}
</style>
</head>
<body>
<a href="/exit" class="x">&#x274C;</a>
<div class="card">
<h2>Preview</h2>
<div class="pv" id="pv">12:34:56</div>
</div>
<div class="card">
<h2>Colors</h2>
<div class="cr"><label>Text</label><input type="color" id="fp" value="#ffffff" oninput="sc('f',this.value)">
<div class="sw">
<button style="background:#fff" onclick="sc('f','#ffffff')"></button>
<button style="background:#f44" onclick="sc('f','#ff4444')"></button>
<button style="background:#44f" onclick="sc('f','#4444ff')"></button>
<button style="background:#4f4" onclick="sc('f','#44ff44')"></button>
<button style="background:#ff4" onclick="sc('f','#ffff44')"></button>
<button style="background:#f80" onclick="sc('f','#ff8800')"></button>
<button style="background:#f4f" onclick="sc('f','#ff44ff')"></button>
<button style="background:#4ff" onclick="sc('f','#44ffff')"></button>
</div></div>
<div class="cr"><label>Background</label><input type="color" id="bp" value="#000000" oninput="sc('b',this.value)">
<div class="sw">
<button style="background:#000;border-color:#666" onclick="sc('b','#000000')"></button>
<button style="background:#111" onclick="sc('b','#0a0a1e')"></button>
<button style="background:#003" onclick="sc('b','#000033')"></button>
<button style="background:#300" onclick="sc('b','#330000')"></button>
<button style="background:#030" onclick="sc('b','#003300')"></button>
<button style="background:#222" onclick="sc('b','#222222')"></button>
</div></div>
</div>
<div class="card">
<h2>Display</h2>
<div class="r"><label>Show Day</label>
<label class="s"><input type="checkbox" id="show_day" onchange="p('show_day='+(this.checked?1:0))"><span class="sl"></span></label></div>
<div class="r"><label>Show Date</label>
<label class="s"><input type="checkbox" id="show_date" onchange="p('show_date='+(this.checked?1:0))"><span class="sl"></span></label></div>
<div class="r"><label>Show Seconds</label>
<label class="s"><input type="checkbox" id="show_seconds" onchange="p('show_seconds='+(this.checked?1:0))"><span class="sl"></span></label></div>
<div class="r"><label>Show Temperature</label>
<label class="s"><input type="checkbox" id="show_temp" onchange="p('show_temp='+(this.checked?1:0))"><span class="sl"></span></label></div>
</div>
<div class="card">
<h2>Weather City</h2>
<div class="ci">
<input type="text" id="city" placeholder="e.g. Stockholm">
<button onclick="p('city='+encodeURIComponent(document.getElementById('city').value))">Set</button>
</div>
</div>
<div class="card">
<h2>Font Size</h2>
<div class="f">
<button id="fb_mini" onclick="sf('mini')">Mini</button>
<button id="fb_small" onclick="sf('small')">Small</button>
<button id="fb_large" onclick="sf('large')">Large</button>
</div>
</div>
<div class="card">
<h2>Scale</h2>
<div class="f">
<button id="sc_1" onclick="ss(1)">1x</button>
<button id="sc_2" onclick="ss(2)">2x</button>
<button id="sc_3" onclick="ss(3)">3x</button>
<button id="sc_4" onclick="ss(4)">4x</button>
</div>
</div>
<button class="b" onclick="p('save=true')">&#128190; Save</button>
<script>
var dt;
function p(q){fetch("/?"+q,{method:"POST"})}
function sc(t,h){
if(t==='f')document.getElementById('fp').value=h;
else document.getElementById('bp').value=h;
upv();clearTimeout(dt);
dt=setTimeout(function(){p((t==='f'?'f_hex':'b_hex')+'='+h.slice(1))},200);
}
function sf(s){p('size='+s);document.querySelectorAll('.f button').forEach(function(b){b.classList.remove('a')});document.getElementById('fb_'+s).classList.add('a')}
function ss(n){p('scale='+n);document.querySelectorAll('#sc_1,#sc_2,#sc_3,#sc_4').forEach(function(b){b.classList.remove('a')});document.getElementById('sc_'+n).classList.add('a')}
function upv(){var v=document.getElementById('pv');v.style.backgroundColor=document.getElementById('bp').value;v.style.color=document.getElementById('fp').value}
fetch("/settings").then(function(r){return r.json()}).then(function(s){
document.getElementById("show_day").checked=s.show_day==1;
document.getElementById("show_date").checked=s.show_date==1;
document.getElementById("show_seconds").checked=s.show_seconds==1;
document.getElementById("show_temp").checked=s.show_temp==1;
if(s.city)document.getElementById("city").value=s.city;
if(s.f_hex)document.getElementById("fp").value=s.f_hex;
if(s.b_hex)document.getElementById("bp").value=s.b_hex;
if(s.font){document.querySelectorAll('.f button').forEach(function(b){b.classList.remove('a')});
var fb=document.getElementById('fb_'+s.font);if(fb)fb.classList.add('a')}
var sc=s.scale||1;document.querySelectorAll('#sc_1,#sc_2,#sc_3,#sc_4').forEach(function(b){b.classList.remove('a')});var sb=document.getElementById('sc_'+sc);if(sb)sb.classList.add('a')
upv();
});
</script>
</body>
</html>
